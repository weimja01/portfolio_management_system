{% extends "base.html" %}

{% block title %}Login - Portfolio System{% endblock %}

{% block content %}
<div class="auth-form">
    <h2>Login</h2>

    <form action="{{ url_for('auth.login') }}" method="POST">
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required autofocus autocomplete="off" required autofocus>
        </div>

        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" autocomplete="off" required>
        </div>

        <button type="submit" class="btn btn-primary">Login</button>
    </form>

    <p class="auth-link">
        Don't have an account? <a href="{{ url_for('auth.register') }}">Register here</a>
    </p>
</div>
{% endblock %}
