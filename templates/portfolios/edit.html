{% extends "base.html" %}

{% block title %}Edit Portfolio - Portfolio System{% endblock %}

{% block content %}
<div class="portfolio-form">
    <h2>Edit Portfolio</h2>

    <form action="{{ url_for('portfolios.edit', portfolio_id=portfolio.portfolio_id) }}" method="POST">
        <div class="form-group">
            <label for="title">Portfolio Title: *</label>
            <input type="text" id="title" name="title" maxlength="100" 
                   value="{{ portfolio.title }}" required>
        </div>

        <div class="form-group">
            <label for="description">Description (optional):</label>
            <textarea id="description" name="description" rows="4">{{ portfolio.description or '' }}</textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{{ url_for('portfolios.view', portfolio_id=portfolio.portfolio_id) }}" 
               class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
